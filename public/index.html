<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>📦 Inventario IA</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f0eb;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #app {
      width: 100%;
      max-width: 700px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #fff;
      box-shadow: 0 0 20px rgba(0,0,0,0.15);
    }

    /* Header */
    #header {
      background: linear-gradient(135deg, #e65100, #bf360c);
      color: white;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    #header .icon { font-size: 28px; }
    #header .info h2 { font-size: 17px; font-weight: 700; }
    #header .info p { font-size: 12px; opacity: 0.85; }

    /* Stats bar */
    #stats-bar {
      background: #bf360c;
      color: white;
      padding: 6px 16px;
      display: flex;
      gap: 16px;
      font-size: 12px;
      flex-wrap: wrap;
    }
    #stats-bar span { opacity: 0.9; }
    #stats-bar strong { opacity: 1; }

    /* Messages area */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #fdf6ee;
    }

    .msg {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.bot {
      background: #fff;
      border: 1px solid #e0d6cc;
      align-self: flex-start;
      border-bottom-left-radius: 3px;
    }

    .msg.user {
      background: #e65100;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 3px;
    }

    .msg.system {
      background: #fff3e0;
      border: 1px solid #ffcc80;
      align-self: center;
      font-size: 12px;
      color: #e65100;
      text-align: center;
      max-width: 90%;
    }

    /* Confirm card */
    .confirm-card {
      background: #fff;
      border: 2px solid #e65100;
      border-radius: 12px;
      padding: 14px;
      align-self: flex-start;
      max-width: 85%;
    }
    .confirm-card h4 {
      color: #e65100;
      margin-bottom: 8px;
      font-size: 14px;
    }
    .confirm-card ul {
      list-style: none;
      margin: 0 0 12px 0;
      padding: 0;
    }
    .confirm-card li {
      font-size: 13px;
      padding: 3px 0;
      color: #444;
    }
    .confirm-card li::before { content: '• '; color: #e65100; }
    .confirm-btns {
      display: flex;
      gap: 10px;
    }
    .btn-confirm {
      background: #e65100;
      color: white;
      border: none;
      padding: 8px 18px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }
    .btn-cancel {
      background: #f5f5f5;
      color: #666;
      border: 1px solid #ddd;
      padding: 8px 18px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
    }
    .btn-confirm:hover { background: #bf360c; }
    .btn-cancel:hover { background: #e0e0e0; }

    /* Report download card */
    .report-card {
      background: #fff8f0;
      border: 1px solid #ffb74d;
      border-radius: 10px;
      padding: 12px 16px;
      align-self: flex-start;
    }
    .report-card a {
      color: #e65100;
      font-weight: 600;
      text-decoration: none;
    }
    .report-card a:hover { text-decoration: underline; }

    /* Typing indicator */
    .typing {
      align-self: flex-start;
      background: #fff;
      border: 1px solid #e0d6cc;
      border-radius: 12px;
      padding: 10px 16px;
      font-size: 13px;
      color: #999;
    }

    /* Quick action buttons */
    #quick-actions {
      display: flex;
      gap: 8px;
      padding: 8px 14px;
      background: #fff;
      border-top: 1px solid #f0e0d0;
      flex-wrap: wrap;
    }
    .quick-btn {
      background: #fff3e0;
      color: #e65100;
      border: 1px solid #ffb74d;
      padding: 6px 12px;
      border-radius: 16px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
    }
    .quick-btn:hover { background: #ffe0b2; }

    /* Input area */
    #input-area {
      display: flex;
      padding: 10px 14px;
      gap: 10px;
      background: #fff;
      border-top: 1px solid #e0d6cc;
    }
    #msg-input {
      flex: 1;
      border: 1px solid #e0d6cc;
      border-radius: 22px;
      padding: 10px 16px;
      font-size: 14px;
      outline: none;
      resize: none;
      font-family: inherit;
    }
    #msg-input:focus { border-color: #e65100; }
    #send-btn {
      background: #e65100;
      color: white;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    #send-btn:hover { background: #bf360c; }
    #send-btn:disabled { background: #ccc; cursor: not-allowed; }
  </style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <div id="header">
    <div class="icon">📦</div>
    <div class="info">
      <h2 id="business-name">Inventario IA</h2>
      <p>Asistente inteligente para tu negocio</p>
    </div>
  </div>

  <!-- Stats bar -->
  <div id="stats-bar">
    <span>Productos: <strong id="stat-products">–</strong></span>
    <span>Stock bajo: <strong id="stat-low">–</strong></span>
    <span>Valor: <strong id="stat-value">–</strong></span>
    <span>Hoy: <strong id="stat-today">–</strong> mov.</span>
  </div>

  <!-- Messages -->
  <div id="messages">
    <div class="msg system">
      ¡Bienvenido! Soy tu asistente de inventario 🏪<br/>
      Dime: "entró mercancía", "vendí 5 camisas", "¿cuánto stock tengo?"
    </div>
  </div>

  <!-- Quick actions -->
  <div id="quick-actions">
    <button class="quick-btn" onclick="quickSend('muéstrame todo el inventario')">📦 Ver Stock</button>
    <button class="quick-btn" onclick="quickSend('¿qué productos tienen stock bajo?')">⚠️ Stock Bajo</button>
    <button class="quick-btn" onclick="quickSend('genera un reporte de inventario')">📊 Reporte</button>
  </div>

  <!-- Input -->
  <div id="input-area">
    <input
      type="text"
      id="msg-input"
      placeholder="Escribe tu mensaje..."
      autocomplete="off"
    />
    <button id="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
  // User ID
  let userId = localStorage.getItem('inventory_user_id');
  if (!userId) {
    userId = 'user_' + Math.random().toString(36).slice(2, 10);
    localStorage.setItem('inventory_user_id', userId);
  }

  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('msg-input');
  const sendBtn = document.getElementById('send-btn');

  // Enter key to send
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addMessage(text, type = 'bot') {
    const div = document.createElement('div');
    div.className = `msg ${type}`;
    div.textContent = text;
    messagesEl.appendChild(div);
    scrollToBottom();
    return div;
  }

  function addTyping() {
    const div = document.createElement('div');
    div.className = 'typing';
    div.id = 'typing-indicator';
    div.textContent = '⏳ Procesando...';
    messagesEl.appendChild(div);
    scrollToBottom();
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  function addConfirmCard(data) {
    const card = document.createElement('div');
    card.className = 'confirm-card';
    card.id = 'confirm-card';

    const actionLabel = data.action === 'entrada' ? '📥 Registrar Entrada' :
                        data.action === 'salida' ? '📤 Registrar Salida' :
                        '➕ Agregar Producto';

    let html = `<h4>${actionLabel}</h4>`;

    if (data.action === 'agregar_producto' && data.new_product) {
      const np = data.new_product;
      html += `<ul>
        <li><strong>${np.name}</strong></li>
        ${np.category ? `<li>Categoría: ${np.category}</li>` : ''}
        ${np.unit ? `<li>Unidad: ${np.unit}</li>` : ''}
        ${np.cost_price ? `<li>Precio compra: $${formatNum(np.cost_price)}</li>` : ''}
        ${np.sell_price ? `<li>Precio venta: $${formatNum(np.sell_price)}</li>` : ''}
      </ul>`;
    } else if (data.products && data.products.length > 0) {
      html += `<ul>${data.products.map(p =>
        `<li>${p.resolved_name || p.name}: <strong>${p.quantity} uds</strong>${p.unit_price ? ` @ $${formatNum(p.unit_price)}` : ''}</li>`
      ).join('')}</ul>`;
    }

    if (data.reply) {
      html += `<p style="font-size:13px;color:#666;margin-bottom:10px;">${data.reply}</p>`;
    }

    html += `<div class="confirm-btns">
      <button class="btn-confirm" onclick="confirmAction(true)">✅ Confirmar</button>
      <button class="btn-cancel" onclick="confirmAction(false)">❌ Cancelar</button>
    </div>`;

    card.innerHTML = html;
    messagesEl.appendChild(card);
    scrollToBottom();
  }

  function addReportCard(data) {
    const card = document.createElement('div');
    card.className = 'report-card';
    card.innerHTML = `<p>📊 ${data.reply}</p><br/><a href="${data.downloadUrl}" download>⬇️ Descargar Reporte Excel</a>`;
    messagesEl.appendChild(card);
    scrollToBottom();
  }

  function formatNum(n) {
    return new Intl.NumberFormat('es-CO').format(Math.round(n || 0));
  }

  async function sendMessage(msg) {
    const message = msg || inputEl.value.trim();
    if (!message) return;

    inputEl.value = '';
    addMessage(message, 'user');
    sendBtn.disabled = true;
    addTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId, message })
      });
      const data = await res.json();
      removeTyping();

      if (data.type === 'confirm') {
        // Remove existing confirm card if any
        const old = document.getElementById('confirm-card');
        if (old) old.remove();
        addConfirmCard(data);
      } else if (data.type === 'report') {
        if (data.reply) addMessage(data.reply, 'bot');
        addReportCard(data);
      } else {
        addMessage(data.reply || data.error || 'Sin respuesta', 'bot');
      }

      updateStats();
    } catch (e) {
      removeTyping();
      addMessage('❌ Error de conexión: ' + e.message, 'bot');
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  function quickSend(msg) {
    sendMessage(msg);
  }

  async function confirmAction(confirmed) {
    const card = document.getElementById('confirm-card');
    if (card) card.remove();

    if (!confirmed) {
      addMessage('❌ Acción cancelada.', 'bot');
      return;
    }

    addTyping();
    try {
      const res = await fetch('/actions/confirm', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId, confirmed: true })
      });
      const data = await res.json();
      removeTyping();
      addMessage(data.reply || 'Acción completada.', 'bot');
      updateStats();
    } catch (e) {
      removeTyping();
      addMessage('❌ Error confirmando acción: ' + e.message, 'bot');
    }
  }

  async function updateStats() {
    try {
      const res = await fetch(`/stats/${userId}`);
      const data = await res.json();

      document.getElementById('stat-products').textContent = data.totalProducts;
      document.getElementById('stat-low').textContent = data.lowStockCount;
      document.getElementById('stat-value').textContent = data.inventoryValueFormatted || '$0 COP';
      document.getElementById('stat-today').textContent = data.todayMovements;

      if (data.businessName && data.businessName !== 'Mi Negocio') {
        document.getElementById('business-name').textContent = data.businessName + ' · 📦 Inventario';
      }
    } catch (e) {
      // Silently fail
    }
  }

  // Initial load
  updateStats();

  // Refresh stats every 30 seconds
  setInterval(updateStats, 30000);
</script>
</body>
</html>
